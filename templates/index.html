{% block conteudo %}
<section class="card">
    <div class="cabecalho-painel">
        <div>
            <h2>Novo relatório técnico</h2>
            <p>Preencha os dados do atendimento abaixo.</p>
        </div>

        <a class="botao-secundario" href="{{ url_for('admin') }}?token=123456">Ir para o painel</a>
    </div>

    <form action="{{ url_for('criar_relatorio') }}" method="POST" class="formulario">
        <div class="form-section">
            <h3>Dados do cliente</h3>

            <div class="grid">
                <label>
                    Cliente *
                    <input type="text" name="cliente" required>
                </label>

                <label>
                    Responsável
                    <input type="text" name="responsavel">
                </label>

                <label>
                    Telefone
                    <input
                        type="text"
                        name="telefone"
                        inputmode="numeric"
                        pattern="[0-9]*"
                        maxlength="11"
                        class="somente-numeros"
                        placeholder="Somente números"
                    >
                </label>

                <label>
                    CEP
                    <input
                        type="text"
                        name="cep"
                        inputmode="numeric"
                        pattern="[0-9]*"
                        maxlength="8"
                        class="somente-numeros"
                        placeholder="Somente números"
                    >
                </label>
            </div>
        </div>

        <div class="form-section">
            <h3>Endereço</h3>

            <div class="grid">
                <label class="campo-largo">
                    Endereço
                    <input type="text" name="endereco">
                </label>

                <label>
                    Cidade
                    <input type="text" name="cidade">
                </label>

                <label>
                    Bairro
                    <input type="text" name="bairro">
                </label>

                <label>
                    UF
                    <input type="text" name="uf" maxlength="2" placeholder="SP">

            </div>
        </div>

                <label>
                    Número de série
                    <input type="text" name="numero_serie">

                <label>
                    Contador geral
                    <input type="text" name="contador_geral">
                </label>

        <div class="form-section">
            <h3>Atendimento técnico</h3>

            <div class="grid">
                <label>
                    Hora inicial
                    <input type="time" name="hora_inicio">
                </label>

                <label>
                    Hora final
                    <input type="time" name="hora_fim">
                </label>

                <label class="campo-largo">
                    Defeito relatado pelo cliente *
                    <textarea name="defeito_relatado" required></textarea>
                </label>

                <label class="campo-largo">
                    Diagnóstico técnico *
                    <textarea name="diagnostico" required></textarea>
                </label>

                <label class="campo-largo">
                    Serviço executado *
                    <textarea name="servico_executado" required></textarea>
                </label>

                <label class="campo-largo">
                    Peças trocadas ou recomendadas
                    <textarea name="pecas"></textarea>
                </label>
            </div>
        </div>

        <div class="form-section">
            <h3>Conclusão</h3>

            <div class="grid">
                <label>
                    Status *
                    <select name="status" required>
                        <option value="Concluído">Concluído</option>
                        <option value="Pendente">Pendente</option>
                        <option value="Aguardando peça">Aguardando peça</option>
                        <option value="Retorno necessário">Retorno necessário</option>
                    </select>
                </label>

                <label>
                    Técnico *
                    <input type="text" name="tecnico" required>
                </label>

                <label class="campo-largo">
                    Observações finais
                    <textarea name="observacoes"></textarea>
                </label>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit">Salvar relatório</button>
        </div>
    </form>

<script>
    document.querySelectorAll(".somente-numeros").forEach((campo) => {
        campo.addEventListener("input", () => {
            campo.value = campo.value.replace(/\D/g, "");
        });
    });
</script>
